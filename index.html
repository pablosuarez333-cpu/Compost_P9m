<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Compost</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/Compost P9m/Style/grid-flexbox.css">
    <link rel="stylesheet" href="/Compost P9m/Style/styles.css">
</head>

<body id="appContainer">

    <header id="headerMain">
        <button id="btnToggleMenu" aria-label="Abrir menú">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="6" width="18" height="2" fill="#333"/>
                <rect x="3" y="11" width="18" height="2" fill="#333"/>
                <rect x="3" y="16" width="18" height="2" fill="#333"/>
            </svg>
        </button>
        <h1 id="appTitle">Sistema Compost</h1>
        <button id="btnToggleCalendar">🔔</button>
    </header>

    <!-- Sidebar izquierdo -->
    <aside id="sidebarLeft" class="sidebar">
        <nav id="navMenu">
            <ol>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="personal.html">Personal</a></li>
                <li><a href="lotes.html">Lotes</a></li>
                <li><a href="registro.html">Registro</a></li>
            </ol>
        </nav>
    </aside>

    <!-- Sidebar derecho -->
    <aside id="sidebarRight" class="sidebar">
        <section id="calendarContainer">
            <h2>Calendario</h2>
        </section>
    </aside>

    <!-- CONTENIDO -->
    <main id="mainContent">

        <section id="lotesContainer">

            <div class="loteCard" data-lote-id="1" data-etapa="termofilica" data-estado="activo">

                <h3 class="loteNombre">Lote 001</h3>

                <div class="loteData">
                    <p class="tempPromedio">55°C</p>
                    <p class="phActual">pH 7.2</p>
                    <p class="etapaActual">Termofílica</p>
                    <p class="fechaBitacora">Última: 20/03/2026</p>
                </div>

            </div>

        </section>

    </main>

    <script src="functions.js"></script>

</body>

</html>
